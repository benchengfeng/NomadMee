# ─────────────────────────────────────────────────────────────────────────────
# nomadme — nginx snippet: per-product OG prerender for social bots
#
# Add the `map` block inside the `http {}` block in /etc/nginx/nginx.conf
# (NOT inside a server block).
# Add the `location` blocks inside your `server {}` block, BEFORE the generic
# `location /` that serves the React SPA.
# ─────────────────────────────────────────────────────────────────────────────

# ── In nginx.conf, inside `http { }` ─────────────────────────────────────────

map $http_user_agent $is_social_bot {
    default 0;
    ~*(bot|crawler|spider|facebookexternalhit|facebookbot|twitterbot|linkedinbot|telegrambot|whatsapp|slackbot|discordbot|vkshare|yandexbot|bingbot|googlebot|baiduspider) 1;
}


# ── In your site config, inside `server { }`, BEFORE `location /` ────────────

# Route social-bot requests for /shop/:productId to the backend prerender endpoint.
# Real browsers skip the `if` and get the SPA as normal.
location ~ "^/shop/[a-fA-F0-9]{24}$" {
    if ($is_social_bot) {
        # Rewrite to the backend prerender route, then proxy to Express.
        rewrite ^/shop/(.+)$ /api/portal/public/og/shop/$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
    # Normal browser traffic: serve the React SPA.
    try_files $uri /index.html;
}
